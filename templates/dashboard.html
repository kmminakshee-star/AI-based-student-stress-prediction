<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<h2>Dashboard</h2>
<canvas id="chart"></canvas>

<script>
var labels = {{ labels | tojson }};
var values = {{ values | tojson }};

new Chart(document.getElementById("chart"), {
    type: 'bar',
    data: {
        labels: labels,
        datasets: [{
            label: 'Stress Count',
            data: values,
            backgroundColor: ['green','orange','red']
        }]
    }
});
</script>
